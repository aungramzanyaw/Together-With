<!DOCTYPE html>
<html>
<head>
  <title>A Special Gift for Seng Pan ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #ff4d6d;
      --secondary: #ff758c;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      background: radial-gradient(circle, #ff758c 0%, #ff4d6d 100%);
      color: white;
      overflow: hidden;
      min-height: 100vh;
    }

    /* 🔐 LOCK SCREEN */
    #lockScreen {
      position: fixed;
      inset: 0;
      background: var(--primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    input {
      padding: 15px;
      font-size: 18px;
      border-radius: 30px;
      border: 2px solid white;
      margin-top: 20px;
      text-align: center;
      background: rgba(255,255,255,0.2);
      color: white;
      outline: none;
    }

    .unlock-btn {
      padding: 15px 40px;
      font-size: 18px;
      margin-top: 20px;
      border: none;
      border-radius: 30px;
      background: white;
      color: var(--primary);
      cursor: pointer;
      font-weight: bold;
    }

    /* 🎁 GIFT BOX SCREEN */
    #giftScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--secondary);
      z-index: 1500;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .gift-box {
      font-size: 100px;
      cursor: pointer;
      transition: transform 0.3s;
      animation: bounce 2s infinite;
    }
    .gift-box:hover { transform: scale(1.1); }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-30px);}
      60% {transform: translateY(-15px);}
    }

    /* 💘 MAIN CONTENT */
    #mainContent {
      display: none;
      padding: 40px 20px;
      height: 100vh;
      overflow-y: auto;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      max-width: 500px;
      margin: 20px auto;
    }

    .gallery img {
      width: 100%;
      height: 450px;
      border-radius: 20px;
      object-fit: cover;
      border: 6px solid white;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      transition: 1s ease-in-out;
    }

    #musicBtn {
      display: none; /* Hidden until unlocked */
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      color: var(--primary);
      border: none;
      padding: 12px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 3000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* DECORATIONS */
    .heart, .balloon {
      position: fixed;
      pointer-events: none;
      z-index: -1;
    }

    .heart { animation: floatUp 4s linear forwards; }
    .balloon { animation: floatUp 6s ease-out forwards; font-size: 40px; }

    @keyframes floatUp {
      0% { transform: translateY(10vh) scale(1); opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>

<body>

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<div id="lockScreen">
  <div style="font-size: 60px;">🔐</div>
  <h2>Enter Our Code</h2>
  <input type="password" id="password" placeholder="DDMMYYYY">
  <button class="unlock-btn" onclick="checkPass()">Unlock ❤️</button>
</div>

<div id="giftScreen">
  <div class="gift-box" onclick="openGift()">🎁</div>
  <h2 style="margin-top: 20px;">You have a message!</h2>
  <p>(Tap the box to open)</p>
</div>

<div id="mainContent">
  <div class="glass-card">
    <h1 style="margin-bottom: 5px;">Seng Pan</h1>
    <div id="counter" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;"></div>
    
    <div class="gallery">
      <img id="slide" src="photo1.jpg">
    </div>

    <div id="typing" style="font-size: 18px; margin-top: 20px; min-height: 60px;"></div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  const correctPassword = "9122024";
  const startDate = new Date("2024-12-09");
  const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
  const messages = [
    "Seng Pan, you are my everything. ❤️",
    "Every second with you is a gift. ✨",
    "Happy 486 days together! 💖",
    "I love you forever and always. 🌹"
  ];

  const audio = document.getElementById("bgMusic");

  // Step 1: Check Password
  function checkPass() {
    if (document.getElementById("password").value === correctPassword) {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("giftScreen").style.display = "flex";
      document.getElementById("musicBtn").style.display = "block"; // Show music button
    } else {
      alert("Wrong password 😢");
    }
  }

  // Step 2: Open Gift & Pop Balloons
  function openGift() {
    // Pop Balloons
    for(let i=0; i<20; i++) {
      setTimeout(createBalloon, i * 100);
    }

    document.getElementById("giftScreen").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("giftScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      audio.play();
      startExperience();
    }, 800);
  }

  // Step 3: Start everything
  function startExperience() {
    // Counter
    const days = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = `✨ ${days} Days Together ✨`;

    // Slideshow & Typing
    let idx = 0;
    setInterval(() => {
      idx = (idx + 1) % messages.length;
      const img = document.getElementById("slide");
      img.style.opacity = 0;
      setTimeout(() => {
        img.src = photos[idx % photos.length];
        img.style.opacity = 1;
      }, 500);
      typeMsg(messages[idx]);
    }, 5000);

    typeMsg(messages[0]);
    setInterval(createHeart, 600);
  }

  function typeMsg(text) {
    let i = 0;
    const el = document.getElementById("typing");
    el.innerHTML = "";
    function t() {
      if (i < text.length) {
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(t, 50);
      }
    }
    t();
  }

  function createBalloon() {
    const b = document.createElement("div");
    b.className = "balloon";
    b.innerHTML = ["🎈","🎨","🌈","✨","💎"][Math.floor(Math.random()*5)];
    b.style.left = Math.random() * 100 + "vw";
    b.style.bottom = "-50px";
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 6000);
  }

  function createHeart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.bottom = "-20px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }

  function toggleMusic() {
    audio.paused ? audio.play() : audio.pause();
  }
</script>

</body>
</html>
