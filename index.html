<!DOCTYPE html>
<html>
<head>
  <title>Our Love ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #ff4d6d;
      --secondary: #ff758c;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      background: radial-gradient(circle, #ff758c 0%, #ff4d6d 100%);
      color: white;
      overflow: hidden;
      min-height: 100vh;
    }

    /* 🔐 1. LOCK SCREEN */
    #lockScreen {
      position: fixed;
      inset: 0;
      background: var(--primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    input {
      padding: 15px;
      font-size: 18px;
      border-radius: 30px;
      border: 2px solid white;
      margin-top: 20px;
      text-align: center;
      background: rgba(255,255,255,0.2);
      color: white;
      outline: none;
      width: 220px;
    }

    .unlock-btn {
      padding: 15px 40px;
      font-size: 18px;
      margin-top: 20px;
      border: none;
      border-radius: 30px;
      background: white;
      color: var(--primary);
      cursor: pointer;
      font-weight: bold;
    }

    /* 🎁 2. GIFT SCREEN */
    #giftScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--secondary);
      z-index: 2000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s;
    }

    .gift-box {
      font-size: 100px;
      cursor: pointer;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-20px);}
      60% {transform: translateY(-10px);}
    }

    /* 💘 3. MAIN CONTENT */
    #mainContent {
      display: none;
      opacity: 0;
      padding: 10px;
      width: 100%;
      height: 100vh;
      box-sizing: border-box;
      transition: opacity 2s;
      overflow-y: auto;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      max-width: 420px;
      width: 90%;
      margin: 15px auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2600; /* Keeps card above most objects */
    }

    .gallery img {
      width: 100%;
      max-width: 280px;
      height: auto;
      max-height: 45vh;
      border-radius: 15px;
      object-fit: cover;
      border: 5px solid white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: opacity 0.8s ease-in-out;
    }

    h1 { font-size: 26px; margin: 10px 0; }
    #counter { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    #typing { font-size: 19px; font-style: italic; min-height: 70px; padding: 10px; line-height: 1.4; }

    #musicBtn {
      display: none;
      position: fixed;
      top: 15px;
      right: 15px;
      background: white;
      color: var(--primary);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 4000;
      font-size: 18px;
    }

    /* 🎈 VERY BIG OBJECTS */
    .balloon, .heart {
      position: fixed;
      pointer-events: none;
      z-index: 2500;
    }

    .balloon { font-size: 90px; animation: floatUpSmooth 9s linear forwards; }
    .heart { font-size: 65px; animation: floatUpSmooth 6s linear forwards; }

    /* Color Filters for Balloons */
    .balloon-blue { filter: hue-rotate(240deg); }
    .balloon-yellow { filter: hue-rotate(60deg); }
    .balloon-white { filter: grayscale(100%) brightness(200%); }
    .balloon-red { filter: none; }

    /* Smooth upward movement with minimal sway */
    @keyframes floatUpSmooth {
      0% { transform: translateY(115vh) translateX(0); opacity: 1; }
      50% { transform: translateY(50vh) translateX(10px); }
      100% { transform: translateY(-130vh) translateX(-10px); opacity: 0; }
    }
  </style>
</head>

<body>

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<div id="lockScreen">
  <div style="font-size: 50px;">🔐</div>
  <h2>Enter Our Code</h2>
  <input type="password" id="password" placeholder="">
  <button class="unlock-btn" onclick="checkPass()">Unlock ❤️</button>
</div>

<div id="giftScreen">
  <div class="gift-box" onclick="openGift()">🎁</div>
  <h2 style="margin-top: 15px;">Open your gift!</h2>
</div>

<div id="mainContent">
  <div class="glass-card">
    <h1>Our Love</h1>
    <div id="counter"></div>
    <div class="gallery"><img id="slide" src="photo1.jpg"></div>
    <div id="typing"></div>
  </div>
  <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
</div>

<script>
  const correctPassword = "9122024";
  const startDate = new Date("2024-12-09");
  const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
  const messages = [
    "Chit, you are my everything, my world and my only one. ❤️",
    "Every second with you is a gift. ✨",
    "486 days of love and happiness together! 💖",
    "I will love you more and forever. 🌹"
  ];

  const audio = document.getElementById("bgMusic");

  function checkPass() {
    if (document.getElementById("password").value === correctPassword) {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("giftScreen").style.display = "flex";
    } else {
      alert("Wrong password 😢");
    }
  }

  function openGift() {
    audio.play();
    document.getElementById("musicBtn").style.display = "block";
    
    // Initial big burst
    for(let i=0; i<30; i++) {
      setTimeout(() => {
        if (i % 2 === 0) createBalloon();
        else createHeartPop();
      }, i * 150);
    }

    document.getElementById("giftScreen").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("giftScreen").style.display = "none";
      const main = document.getElementById("mainContent");
      main.style.display = "block";
      setTimeout(() => { main.style.opacity = "1"; }, 100);
      startExperience();
    }, 2200);
  }

  function startExperience() {
    const today = new Date();
    const days = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = `✨ ${days} Days Together ✨`;

    let idx = 0;
    setInterval(() => {
      idx = (idx + 1) % messages.length;
      const img = document.getElementById("slide");
      img.style.opacity = 0;
      setTimeout(() => {
        img.src = photos[idx % photos.length];
        img.style.opacity = 1;
      }, 500);
      typeMsg(messages[idx]);
    }, 5000);

    typeMsg(messages[0]);
    
    // CONTINUOUS BALANCED LOOP
    setInterval(createBalloon, 1200);
    setInterval(createHeartPop, 1200);
  }

  function createBalloon() {
    const b = document.createElement("div");
    b.className = "balloon";
    b.innerHTML = "🎈";
    
    const colors = ["balloon-red", "balloon-blue", "balloon-yellow", "balloon-white"];
    b.classList.add(colors[Math.floor(Math.random() * colors.length)]);

    // POSITION: Only fly on the left or right sides (0-20% or 80-100% of screen)
    const side = Math.random() > 0.5 ? Math.random() * 20 : 80 + Math.random() * 15;
    b.style.left = side + "vw";
    b.style.bottom = "-150px";
    
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 9000);
  }

  function createHeartPop() {
    const h = document.createElement("div");
    h.className = "heart";
    const hearts = ["❤️","💖","💝","💕","💗"];
    h.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
    
    // POSITION: Only fly on the left or right sides
    const side = Math.random() > 0.5 ? Math.random() * 20 : 80 + Math.random() * 15;
    h.style.left = side + "vw";
    h.style.bottom = "-120px";
    
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 7000);
  }

  function typeMsg(text) {
    let i = 0;
    const el = document.getElementById("typing");
    el.innerHTML = "";
    function t() {
      if (i < text.length) {
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(t, 50);
      }
    }
    t();
  }

  function toggleMusic() {
    audio.paused ? audio.play() : audio.pause();
  }
</script>
</body>
</html>
