<!DOCTYPE html>
<html>
<head>
  <title>Secret Love ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow-x: hidden;
    }

    #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #ff758c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #ff758c;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover { background: #ffebee; }

    #mainContent {
      display: none;
      padding-bottom: 50px;
    }

    h1 { margin-top: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    #counter { font-size: 26px; font-weight: bold; margin: 25px 0; }
    #typing { font-size: 20px; font-style: italic; min-height: 50px; padding: 0 20px; line-height: 1.5; }

    .gallery { margin-top: 35px; }
    .gallery img {
      width: 320px;
      height: 320px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 6px solid white;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
      z-index: -1;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<div id="lockScreen">
  <h2>💖 Our Secret Corner 💖</h2>
  <p>Password is our start date (DDMMYYYY)</p>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="checkPassword()">Unlock ❤️</button>
</div>

<div id="mainContent">

<h1>❤️ Your Love ❤️ Seng Pan ❤️</h1>

<div id="counter"></div>
<div id="typing"></div>

<div class="gallery">
  <img id="slide" src="photo1.jpg">
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>
  // PASSWORD CONFIG
  var correctPassword = "9122024";

  function checkPassword() {
    var input = document.getElementById("password").value;
    if (input === correctPassword) {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      
      // Attempt to play music
      var audio = document.getElementById("bgMusic");
      audio.play().catch(function(e) {
        console.log("Music blocked by browser settings.");
      });
      
      startTyping();
    } else {
      alert("Oops! That's not our secret code 😢");
    }
  }

  // DATE CALCULATION
  var startDate = new Date("2024-12-09");
  function updateCounter() {
    var today = new Date();
    var diff = today - startDate;
    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = days + " days of loving you 💖";
  }
  updateCounter();

  // TYPING EFFECT
  var messageText = "Seng Pan, you are my everything. Every second with you is a gift. I love you forever ❤️";
  var charIndex = 0;
  function startTyping() {
    if (charIndex < messageText.length) {
      document.getElementById("typing").innerHTML += messageText.charAt(charIndex);
      charIndex++;
      setTimeout(startTyping, 70);
    }
  }

  // SLIDESHOW (Synced to your clean filenames)
  var imagePaths = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
  var currentImgIndex = 0;
  setInterval(function() {
    currentImgIndex = (currentImgIndex + 1) % imagePaths.length;
    document.getElementById("slide").src = imagePaths[currentImgIndex];
  }, 3500);

  // ANIMATED HEARTS
  function createHeart() {
    var heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }
  setInterval(createHeart, 600);
</script>

</body>
</html>
