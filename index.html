<!DOCTYPE html>
<html>
<head>
  <title>A Special Gift for Seng Pan ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #ff4d6d;
      --secondary: #ff758c;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      background: radial-gradient(circle, #ff758c 0%, #ff4d6d 100%);
      color: white;
      overflow: hidden;
      min-height: 100vh;
    }

    /* 🔐 1. LOCK SCREEN */
    #lockScreen {
      position: fixed;
      inset: 0;
      background: var(--primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    input {
      padding: 15px;
      font-size: 18px;
      border-radius: 30px;
      border: 2px solid white;
      margin-top: 20px;
      text-align: center;
      background: rgba(255,255,255,0.2);
      color: white;
      outline: none;
    }

    .unlock-btn {
      padding: 15px 40px;
      font-size: 18px;
      margin-top: 20px;
      border: none;
      border-radius: 30px;
      background: white;
      color: var(--primary);
      cursor: pointer;
      font-weight: bold;
    }

    /* 🎁 2. GIFT BOX SCREEN */
    #giftScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--secondary);
      z-index: 2000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s;
    }

    .gift-box {
      font-size: 100px;
      cursor: pointer;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-30px);}
      60% {transform: translateY(-15px);}
    }

    /* 💘 3. MAIN CONTENT */
    #mainContent {
      display: none;
      opacity: 0;
      padding: 40px 20px;
      height: 100vh;
      overflow-y: auto;
      transition: opacity 2s;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      max-width: 450px;
      margin: 20px auto;
    }

    .gallery img {
      width: 100%;
      height: 450px;
      border-radius: 20px;
      object-fit: cover;
      border: 6px solid white;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    #musicBtn {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      color: var(--primary);
      border: none;
      padding: 12px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 4000;
    }

    .balloon, .heart {
      position: fixed;
      pointer-events: none;
      z-index: 2500;
    }

    .balloon { font-size: 50px; animation: floatUp 6s ease-in forwards; }
    .heart { font-size: 25px; animation: floatUp 4s linear forwards; z-index: -1; }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<div id="lockScreen">
  <div style="font-size: 60px;">🔐</div>
  <h2>Enter Our Code</h2>
  <input type="password" id="password" placeholder="">
  <button class="unlock-btn" onclick="checkPass()">Unlock ❤️</button>
</div>

<div id="giftScreen">
  <div class="gift-box" onclick="openGift()">🎁</div>
  <h2 style="margin-top: 20px;">Open your gift, Seng Pan!</h2>
</div>

<div id="mainContent">
  <div class="glass-card">
    <h1 id="userName">Seng Pan</h1>
    <div id="counter" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;"></div>
    
    <div class="gallery">
      <img id="slide" src="photo1.jpg">
    </div>

    <div id="typing" style="font-size: 18px; margin-top: 20px; min-height: 60px;"></div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  const correctPassword = "9122024";
  const startDate = new Date("2024-12-09");
  const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
  const messages = [
    "Seng Pan, you are my everything, my world and my only one. ❤️",
    "Every second with you is a gift. ✨",
    "486 days of love and happiness together! 💖",
    "I will love you more and forever. 🌹"
  ];

  const audio = document.getElementById("bgMusic");

  function checkPass() {
    if (document.getElementById("password").value === correctPassword) {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("giftScreen").style.display = "flex";
    } else {
      alert("Wrong password 😢");
    }
  }

  function openGift() {
    audio.play();
    document.getElementById("musicBtn").style.display = "block";

    for(let i=0; i<25; i++) {
      setTimeout(createBalloon, i * 150);
    }

    document.getElementById("giftScreen").style.opacity = "0";
    
    setTimeout(() => {
      document.getElementById("giftScreen").style.display = "none";
      const main = document.getElementById("mainContent");
      main.style.display = "block";
      setTimeout(() => { main.style.opacity = "1"; }, 100);
      startExperience();
    }, 2500);
  }

  function startExperience() {
    const days = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = `✨ ${days} Days Together ✨`;

    let idx = 0;
    setInterval(() => {
      idx = (idx + 1) % messages.length;
      const img = document.getElementById("slide");
      img.style.opacity = 0;
      setTimeout(() => {
        img.src = photos[idx % photos.length];
        img.style.opacity = 1;
      }, 500);
      typeMsg(messages[idx]);
    }, 5000);

    typeMsg(messages[0]);
    setInterval(createHeart, 700);
  }

  function createBalloon() {
    const b = document.createElement("div");
    b.className = "balloon";
    const colors = ["🎈","🎨","🌈","✨","💎","💖","🎊"];
    b.innerHTML = colors[Math.floor(Math.random()*colors.length)];
    b.style.left = Math.random() * 100 + "vw";
    b.style.bottom = "-100px";
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 6000);
  }

  function createHeart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.bottom = "-50px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }

  function typeMsg(text) {
    let i = 0;
    const el = document.getElementById("typing");
    el.innerHTML = "";
    function t() {
      if (i < text.length) {
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(t, 50);
      }
    }
    t();
  }

  function toggleMusic() {
    audio.paused ? audio.play() : audio.pause();
  }
</script>

</body>
</html>
