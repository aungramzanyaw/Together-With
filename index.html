<!DOCTYPE html>
<html>
<head>
  <title>Secret Love ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow-x: hidden;
    }

    #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #ff758c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      text-align: center;
      outline: none;
    }

    .unlock-btn {
      padding: 12px 25px;
      font-size: 18px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #ff758c;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    #mainContent {
      display: none;
      padding: 20px;
    }

    h1 { margin-top: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    
    #counter { font-size: 24px; font-weight: bold; margin: 20px 0; }
    
    #typing { 
      font-size: 18px; 
      font-style: italic; 
      min-height: 60px; 
      padding: 0 15px; 
      line-height: 1.6;
    }

    .gallery { margin-top: 20px; position: relative; display: inline-block; }
    .gallery img {
      width: 300px;
      height: 300px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 6px solid white;
      transition: opacity 0.5s ease-in-out;
    }

    .music-control {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid white;
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
      z-index: -1;
      user-select: none;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<div id="lockScreen">
  <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
  <h2>Seng Pan & Your Secret</h2>
  <p style="font-size: 14px; opacity: 0.9;">Password is our date (DDMMYYYY)</p>
  <input type="password" id="password" placeholder="Enter password">
  <button class="unlock-btn" onclick="unlockAndPlay()">Unlock & Start Music ❤️</button>
</div>

<div id="mainContent">

  <h1>❤️ Seng Pan ❤️</h1>

  <div id="counter"></div>
  <div id="typing"></div>

  <div class="gallery">
    <img id="slide" src="photo1.jpg">
  </div>

  <br>
  <button class="music-control" onclick="toggleMusic()" id="musicBtn">🎵 Pause Music</button>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

</div>

<script>
  // --- CONFIGURATION ---
  var correctPassword = "9122024";
  var startDate = new Date("2024-12-09");
  var messageText = "Seng Pan, you are my everything. Every second with you is a gift. I love you forever ❤️";
  var images = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
  
  var audio = document.getElementById("bgMusic");
  var musicBtn = document.getElementById("musicBtn");

  // --- UNLOCK FUNCTION ---
  function unlockAndPlay() {
    var input = document.getElementById("password").value;
    if (input === correctPassword) {
      // Hide lock, show content
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      
      // Start Music
      audio.play().catch(function(e) {
        console.log("Audio play failed, user must click button.");
      });
      
      // Start Animations
      startTyping();
      startSlideshow();
      startHearts();
      updateCounter();
    } else {
      alert("Wrong password! Think of our special day... 😢");
    }
  }

  // --- MUSIC TOGGLE ---
  function toggleMusic() {
    if (audio.paused) {
      audio.play();
      musicBtn.innerHTML = "🎵 Pause Music";
    } else {
      audio.pause();
      musicBtn.innerHTML = "🎵 Play Music";
    }
  }

  // --- DATE COUNTER ---
  function updateCounter() {
    var today = new Date();
    var diff = today - startDate;
    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = days + " days of Love 💖";
  }

  // --- TYPING EFFECT ---
  var charIndex = 0;
  function startTyping() {
    if (charIndex < messageText.length) {
      document.getElementById("typing").innerHTML += messageText.charAt(charIndex);
      charIndex++;
      setTimeout(startTyping, 70);
    }
  }

  // --- SLIDESHOW ---
  function startSlideshow() {
    var imgElement = document.getElementById("slide");
    var index = 0;
    setInterval(function() {
      index = (index + 1) % images.length;
      imgElement.style.opacity = 0; // Fade out
      setTimeout(function() {
        imgElement.src = images[index];
        imgElement.style.opacity = 1; // Fade in
      }, 500);
    }, 4000);
  }

  // --- FLOATING HEARTS ---
  function startHearts() {
    setInterval(function() {
      var heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 15) + "px";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }, 600);
  }
</script>

</body>
</html>
