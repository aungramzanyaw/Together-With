<!DOCTYPE html>
<html>
<head>
  <title>Secret Love ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow-x: hidden;
    }

    #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #ff758c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      text-align: center;
    }

    .unlock-btn {
      padding: 12px 25px;
      font-size: 18px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #ff758c;
      cursor: pointer;
      font-weight: bold;
    }

    #mainContent {
      display: none;
      padding: 20px;
    }

    .gallery img {
      width: 300px;
      height: 400px; /* Adjusted for portrait photos */
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 6px solid white;
      transition: opacity 0.8s ease-in-out;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
      z-index: -1;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<div id="lockScreen">
  <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
  <h2>Seng Pan & Your Secret</h2>
  <input type="password" id="password" placeholder="Enter password">
  <button class="unlock-btn" onclick="unlockAndPlay()">Unlock & Start Music ❤️</button>
</div>

<div id="mainContent">
  <h1>❤️ Seng Pan ❤️</h1>
  <div id="counter" style="font-size: 24px; font-weight: bold; margin: 20px 0;"></div>
  <div id="typing" style="font-size: 18px; font-style: italic; min-height: 60px;"></div>

  <div class="gallery">
    <img id="slide" src="photo1.jpg">
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  var correctPassword = "9122024";
  var startDate = new Date("2024-12-09");
  var messageText = "Seng Pan, you are my everything. Every second with you is a gift. I love you forever ❤️";
  // ENSURE THESE MATCH GITHUB EXACTLY (Case-sensitive!)
  var images = ["photo1.jpg", "photo2.jpg", "photo3.jpg"]; 

  function unlockAndPlay() {
    var input = document.getElementById("password").value;
    if (input === correctPassword) {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      
      var audio = document.getElementById("bgMusic");
      audio.play();
      
      startEverything();
    } else {
      alert("Wrong password! 😢");
    }
  }

  function startEverything() {
    // 1. Counter
    var today = new Date();
    var days = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = days + " days of Love 💖";

    // 2. Typing
    var i = 0;
    function type() {
      if (i < messageText.length) {
        document.getElementById("typing").innerHTML += messageText.charAt(i);
        i++;
        setTimeout(type, 70);
      }
    }
    type();

    // 3. Slideshow
    var imgElement = document.getElementById("slide");
    var idx = 0;
    setInterval(function() {
      idx = (idx + 1) % images.length;
      imgElement.style.opacity = 0;
      setTimeout(function() {
        imgElement.src = images[idx];
        imgElement.style.opacity = 1;
      }, 800);
    }, 4000);

    // 4. Hearts
    setInterval(function() {
      var heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }, 600);
  }
</script>

</body>
</html>
