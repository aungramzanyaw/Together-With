<!DOCTYPE html>
<html>
<head>
  <title>Our Love ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #ff4d6d;
      --secondary: #ff758c;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      background: radial-gradient(circle, #ff758c 0%, #ff4d6d 100%);
      color: white;
      overflow: hidden; /* Prevents scrollbars during animations */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 🔐 1. LOCK SCREEN */
    #lockScreen {
      position: fixed;
      inset: 0;
      background: var(--primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    input {
      padding: 15px;
      font-size: 18px;
      border-radius: 30px;
      border: 2px solid white;
      margin-top: 20px;
      text-align: center;
      background: rgba(255,255,255,0.2);
      color: white;
      outline: none;
      width: 250px;
    }

    .unlock-btn {
      padding: 15px 40px;
      font-size: 18px;
      margin-top: 20px;
      border: none;
      border-radius: 30px;
      background: white;
      color: var(--primary);
      cursor: pointer;
      font-weight: bold;
    }

    /* 🎁 2. GIFT BOX SCREEN */
    #giftScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--secondary);
      z-index: 2000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s;
    }

    .gift-box {
      font-size: 100px;
      cursor: pointer;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-20px);}
      60% {transform: translateY(-10px);}
    }

    /* 💘 3. MAIN CONTENT */
    #mainContent {
      display: none;
      opacity: 0;
      padding: 10px;
      width: 100%;
      height: 100vh;
      box-sizing: border-box;
      transition: opacity 2s;
      overflow-y: auto; /* Allows scrolling if content is too tall */
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      max-width: 450px;
      width: 95%;
      margin: 10px auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* PICTURE FRAME FIX */
    .gallery img {
      width: 100%;
      max-width: 300px; /* Limits size on laptop */
      height: auto;
      max-height: 50vh; /* Limits height so it fits on phone screens */
      border-radius: 15px;
      object-fit: cover;
      border: 5px solid white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: opacity 0.8s ease-in-out;
    }

    /* TEXT FIX */
    h1 { font-size: 28px; margin: 10px 0; }
    
    #counter { 
      font-size: 22px; 
      font-weight: bold; 
      margin-bottom: 15px; 
    }

    #typing { 
      font-size: 20px; /* Bigger text for phones */
      font-style: italic; 
      min-height: 80px; 
      padding: 10px;
      line-height: 1.4;
    }

    #musicBtn {
      display: none;
      position: fixed;
      top: 15px;
      right: 15px;
      background: white;
      color: var(--primary);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 4000;
      font-size: 20px;
    }

    /* BIG ANIMATIONS */
    .balloon, .heart {
      position: fixed;
      pointer-events: none;
      z-index: 2500;
    }

    .balloon { font-size: 60px; animation: floatUp 7s ease-in forwards; }
    .heart { font-size: 40px; animation: floatUp 5s linear forwards; z-index: 2400; }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<div id="lockScreen">
  <div style="font-size: 50px;">🔐</div>
  <h2>Enter Our Code</h2>
  <input type="password" id="password" placeholder="">
  <button class="unlock-btn" onclick="checkPass()">Unlock ❤️</button>
</div>

<div id="giftScreen">
  <div class="gift-box" onclick="openGift()">🎁</div>
  <h2 style="margin-top: 15px;">Open your gift!</h2>
</div>

<div id="mainContent">
  <div class="glass-card">
    <h1>Our Love</h1>
    <div id="counter"></div>
    
    <div class="gallery">
      <img id="slide" src="photo1.jpg">
    </div>

    <div id="typing"></div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  const correctPassword = "9122024";
  const startDate = new Date("2024-12-09");
  const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
  const messages = [
    "Seng Pan, you are my everything, my world and my only one. ❤️",
    "Every second with you is a gift. ✨",
    "486 days of love and happiness together! 💖",
    "I will love you more and forever. 🌹"
  ];

  const audio = document.getElementById("bgMusic");

  function checkPass() {
    if (document.getElementById("password").value === correctPassword) {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("giftScreen").style.display = "flex";
    } else {
      alert("Wrong password 😢");
    }
  }

  function openGift() {
    audio.play();
    document.getElementById("musicBtn").style.display = "block";

    for(let i=0; i<35; i++) {
      setTimeout(() => {
        if (Math.random() > 0.5) createBalloon();
        else createHeartPop();
      }, i * 100);
    }

    document.getElementById("giftScreen").style.opacity = "0";
    
    setTimeout(() => {
      document.getElementById("giftScreen").style.display = "none";
      const main = document.getElementById("mainContent");
      main.style.display = "block";
      setTimeout(() => { main.style.opacity = "1"; }, 100);
      startExperience();
    }, 2500);
  }

  function startExperience() {
    const days = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = `✨ ${days} Days Together ✨`;

    let idx = 0;
    setInterval(() => {
      idx = (idx + 1) % messages.length;
      const img = document.getElementById("slide");
      img.style.opacity = 0;
      setTimeout(() => {
        img.src = photos[idx % photos.length];
        img.style.opacity = 1;
      }, 500);
      typeMsg(messages[idx]);
    }, 5000);

    typeMsg(messages[0]);
    setInterval(createHeartPop, 600);
  }

  function createBalloon() {
    const b = document.createElement("div");
    b.className = "balloon";
    b.innerHTML = ["🎈","✨","💖"][Math.floor(Math.random()*6)];
    b.style.left = Math.random() * 90 + "vw";
    b.style.bottom = "-100px";
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 7000);
  }

  function createHeartPop() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = ["❤️","💖","💝","💕","💗"][Math.floor(Math.random()*5)];
    h.style.left = Math.random() * 90 + "vw";
    h.style.bottom = "-100px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }

  function typeMsg(text) {
    let i = 0;
    const el = document.getElementById("typing");
    el.innerHTML = "";
    function t() {
      if (i < text.length) {
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(t, 50);
      }
    }
    t();
  }

  function toggleMusic() {
    audio.paused ? audio.play() : audio.pause();
  }
</script>

</body>
</html>
